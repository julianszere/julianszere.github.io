<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.2/p5.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const SLIDER_X = 15;
const SLIDER_W = 120;
const BALL_D = 10;

let nBalls = 100, nCycles = 10, period = 4000;
let balls = [], t = 0;
let sliderBalls, sliderCycles, sliderPeriod;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100);

  sliderBalls  = makeSlider(1, 200, nBalls,   8);
  sliderCycles = makeSlider(1, 50, nCycles, 32);
  sliderPeriod = makeSlider(1000, 10000, period, 56);

  initBalls();
}

function makeSlider(lo, hi, val, y) {
  let s = createSlider(lo, hi, val);
  s.position(SLIDER_X, y);
  s.style('width', SLIDER_W + 'px');
  return s;
}

function initBalls() {
  balls = [];
  for (let i = 0; i < nBalls; i++) balls.push(new Ball(i));
}

function draw() {
  if (nBalls  != sliderBalls.value()  ||
      nCycles != sliderCycles.value() ||
      period  != sliderPeriod.value()) {
    nBalls  = sliderBalls.value();
    nCycles = sliderCycles.value();
    period  = sliderPeriod.value();
    initBalls(); t = 0;
  }

  background(255);

  colorMode(RGB);
  fill(60); noStroke();
  textFont('Courier New'); textSize(11); textAlign(LEFT, CENTER);
  text('balls: '  + nBalls,  SLIDER_X + SLIDER_W + 6, 16);
  text('cycles: ' + nCycles, SLIDER_X + SLIDER_W + 6, 40);
  text('period: ' + period,  SLIDER_X + SLIDER_W + 6, 64);
  colorMode(HSB, 360, 100, 100);

  push();
  translate(width / 2, height / 2);
  for (let b of balls) { b.move(); b.display(); }
  pop();

  t += 1;
}

class Ball {
  constructor(i) {
    this.i = i;
    this.hue = map(i, 0, max(nBalls - 1, 1), 0, 300);
  }
  move() {
    let maxR = min(width, height) / 2 - BALL_D;
    let r = map(this.i, 0, max(nBalls - 1, 1), BALL_D, maxR);
    let w = 2 * PI * (nCycles + this.i) / period;
    this.x = r * cos(w * t);
    this.y = r * sin(w * t);
  }
  display() {
    noStroke();
    fill(this.hue, 80, 55);
    circle(this.x, this.y, BALL_D);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  initBalls(); t = 0;
}
</script>
</body>
</html>

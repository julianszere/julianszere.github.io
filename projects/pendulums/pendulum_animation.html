<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.1.9/p5.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const SLIDER_X = 15;
const SLIDER_W = 120;
const BALL_D = 10;

let nBalls = 20, nCycles = 20, speed = 2000, angle = 20;
let pendulums = [], t = 0, l_max, c1, c2;
let sliderBalls, sliderCycles, sliderSpeed, sliderAngle;

function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  angleMode(DEGREES);
  l_max = windowHeight * 0.8;
  c1 = color(210, 35, 55);
  c2 = color(75, 10, 155);

  sliderBalls  = makeSlider(1, 30, nBalls,  8);
  sliderCycles = makeSlider(1, 50, nCycles, 32);
  sliderSpeed  = makeSlider(500, 10000, speed, 56);
  sliderAngle  = makeSlider(0, 90, angle,   80);

  initBalls();
}

function makeSlider(lo, hi, val, y) {
  let s = createSlider(lo, hi, val);
  s.position(SLIDER_X, y);
  s.style('width', SLIDER_W + 'px');
  return s;
}

function initBalls() {
  pendulums = [];
  for (let i = 0; i < nBalls; i++)
    pendulums.push(new Pendulum(l_max * (nCycles / (nCycles + i)) ** 2));
}

function draw() {
  if (nBalls  != sliderBalls.value()  || nCycles != sliderCycles.value() ||
      speed   != sliderSpeed.value()  || angle   != sliderAngle.value()) {
    nBalls = sliderBalls.value(); nCycles = sliderCycles.value();
    speed  = sliderSpeed.value(); angle   = sliderAngle.value();
    initBalls(); t = 0;
  }

  background(255);

  fill(60); noStroke();
  textFont('Courier New'); textSize(11); textAlign(LEFT, CENTER);
  text('balls: '  + nBalls,  SLIDER_X + SLIDER_W + 6, 16);
  text('cycles: ' + nCycles, SLIDER_X + SLIDER_W + 6, 40);
  text('speed: '  + speed,   SLIDER_X + SLIDER_W + 6, 64);
  text('angle: '  + angle,   SLIDER_X + SLIDER_W + 6, 88);

  push();
  translate(width / 2, 0);
  for (let p of pendulums) { p.move(); p.display(); }
  pop();

  t += 1;
}

class Pendulum {
  constructor(r) {
    this.r = r;
    this.w = sqrt(speed / this.r);
    this.c = lerpColor(c1, c2, this.r / l_max);
  }
  move()    { this.theta = angle * cos(this.w * t); }
  display() {
    let x = this.r * sin(this.theta);
    let y = this.r * cos(this.theta);
    stroke(70); strokeWeight(1); line(0, 0, x, y);
    noStroke(); fill(this.c); circle(x, y, BALL_D);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  l_max = windowHeight * 0.8;
  initBalls(); t = 0;
}
</script>
</body>
</html>

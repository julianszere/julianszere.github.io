<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEG Calculator</title>
    <link rel="stylesheet" type="text/css" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        background: #fff;
        background-image: none;
        color: #000;
        text-shadow: none;
        font-family: "Courier New", Courier, monospace;
        padding: 1rem 0 0.5rem;
        min-height: unset;
        overflow: visible;
      }
      .control-row {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .inputs-group {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .inputs-group .input-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
      }
      .inputs-group label {
        font-size: 11px;
        color: #888;
        text-shadow: none;
        font-weight: normal;
        margin-bottom: 2px;
      }
      .inputs-group input[type="number"] {
        width: 60px;
        padding: 6px;
        font-size: 14px;
        background: #fff;
        color: #000;
        border: 1px solid #ccc;
        border-radius: 3px;
        text-align: center;
      }
      .inputs-group .vs {
        font-size: 14px;
        color: #000;
        text-shadow: none;
        margin: 0 2px;
        padding-top: 16px;
      }
      .prob-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }
      .prob-group-label {
        font-size: 11px;
        color: #888;
      }
      #last-probability {
        font-size: 14px;
        font-family: "Courier New", Courier, monospace;
        padding: 6px 12px;
        border-radius: 3px;
        color: #fff;
        min-width: 70px;
        text-align: center;
        margin: 0;
        border: none;
        background-color: #0066cc;
      }
      .toggle-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
      }
      .toggle-group-label {
        font-size: 11px;
        color: #888;
        text-align: center;
      }
      .toggle-side-labels {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .toggle-side-label {
        font-size: 11px;
        color: #888;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 26px;
      }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #0066cc;
        transition: 0.3s;
        border-radius: 26px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 20px; width: 20px;
        left: 3px; bottom: 3px;
        background-color: #fff;
        transition: 0.3s;
        border-radius: 50%;
      }
      input:checked + .slider { background-color: #cc0000; }
      input:checked + .slider:before { transform: translateX(24px); }
      .chart-container {
        position: relative;
        width: 90%;
        max-width: 500px;
        height: 300px;
        margin: 0.5rem auto 0.5rem;
        background-color: #fff;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>

    <div class="control-row">

      <div class="inputs-group">
        <div class="input-group">
          <label for="attacker">Attacker</label>
          <input type="number" id="attacker" min="2" value="20" />
        </div>
        <span class="vs">vs</span>
        <div class="input-group">
          <label for="defender">Defender</label>
          <input type="number" id="defender" min="1" value="5" />
        </div>
      </div>

      <div class="prob-group" id="prob-group" style="display:none">
        <span class="prob-group-label">win probability</span>
        <p id="last-probability"></p>
      </div>

      <div class="toggle-group" id="toggle-group" style="display:none">
        <div class="toggle-side-labels">
          <span class="toggle-side-label">attacker</span>
          <label class="switch">
            <input type="checkbox" id="toggleSwitch">
            <span class="slider"></span>
          </label>
          <span class="toggle-side-label">defender</span>
        </div>
      </div>

    </div>

    <div class="chart-container" style="display: none;">
      <canvas id="barChart"></canvas>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
